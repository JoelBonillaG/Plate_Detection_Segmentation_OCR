services:
  postgres:
    image: postgres:16-alpine
    container_name: monitoreo_vehicular_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-monitoreo_vehicular}
      POSTGRES_USER: ${POSTGRES_USER:-monitoreo_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-monitoreo_pass}
      TZ: ${TZ:-America/Guayaquil}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:${POSTGRES_CONTAINER_PORT:-5432}"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/database/init.sql:/docker-entrypoint-initdb.d/01-init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
